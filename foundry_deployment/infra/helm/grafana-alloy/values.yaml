alloy:
    mounts:
        varlog: true
    configMap:
        content: |-
            logging {
              level  = "info"
              format = "logfmt"
            }

            discovery.kubernetes "pods" {
              role = "pod"
            }

            loki.source.kubernetes "pods" {
              targets    = discovery.kubernetes.pods.targets
              forward_to = [loki.write.endpoint.receiver]
            }

            loki.write "endpoint" {
              endpoint {
                  url = "http://loki.noodles.quest/loki/api/v1/push"
                  tenant_id = "noodles"
              }
            }
