apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: secure-redirect
  namespace: monitoring
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-ingress-route
  namespace: monitoring
  labels:
    noodles.dashboard/service: "true"
  annotations:
    noodles.dashboard/name: "Grafana"
    noodles.dashboard/description: "Metrics and dashboards"
    noodles.dashboard/category: "Monitoring"
    noodles.dashboard/url: "https://noodles.quest/grafana"
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`noodles.quest`) && PathPrefix(`/grafana`)
      kind: Rule
      services:
        - name: grafana-traefik-service
          kind: TraefikService
          namespace: monitoring
      middlewares:
        - name: secure-redirect
  tls:
    secretName: noodles-quest-prod-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: loki-ingress-route
  namespace: monitoring
  labels:
    noodles.dashboard/service: "true"
  annotations:
    noodles.dashboard/name: "Loki"
    noodles.dashboard/description: "Log aggregation"
    noodles.dashboard/category: "Monitoring"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`loki.noodles.quest`) && PathPrefix(`/loki/api/v1`)
      kind: Rule
      services:
        - name: loki-traefik-service
          kind: TraefikService
          namespace: monitoring
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus-ingress-route
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`noodles.local`) && PathPrefix(`/metrics`)
      kind: Rule
      services:
        - name: prometheus@internal
          kind: TraefikService