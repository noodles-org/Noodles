apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pihole-route
  namespace: pihole
  labels:
    noodles.dashboard/service: "true"
  annotations:
    noodles.dashboard/name: "Pi-hole"
    noodles.dashboard/description: "Network-wide DNS and ad blocking"
    noodles.dashboard/category: "Networking"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`pihole.noodles.local`)
      kind: Rule
      services:
        - name: traefik-service
          namespace: pihole
          kind: TraefikService
