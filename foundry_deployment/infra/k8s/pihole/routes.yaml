apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pihole-route
  namespace: pihole
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`pihole.noodles.local`)
      kind: Rule
      services:
        - name: traefik-service
          namespace: pihole
          kind: TraefikService
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: pihole-dns-tcp
  namespace: pihole
spec:
  entryPoints:
    - dns-tcp
  routes:
    - match: HostSNI(`*`)
      services:
        - name: service
          namespace: pihole
          port: 53
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteUDP
metadata:
  name: pihole-dns-udp
  namespace: pihole
spec:
  entryPoints:
    - dns-udp
  routes:
    - services:
        - name: service
          namespace: pihole
          port: 53
