apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pihole-route
  namespace: pihole
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`pihole.noodles.local`)
      kind: Rule
      services:
        - name: traefik-service
          namespace: pihole
          kind: TraefikService
