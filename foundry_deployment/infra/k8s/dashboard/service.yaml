apiVersion: v1
kind: Service
metadata:
  name: noodles-dashboard
  namespace: dashboard
  labels:
    app: noodles-dashboard
spec:
  selector:
    app: noodles-dashboard
  ports:
    - name: http
      port: 3000
      targetPort: http
    - name: metrics
      port: 9090
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: noodles-dashboard
  namespace: dashboard
  labels:
    app: noodles-dashboard
spec:
  selector:
    matchLabels:
      app: noodles-dashboard
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
