apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: dex-ingress-route
  namespace: auth
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNI(`dex.noodles.quest`)
      services:
        - name: dex
          namespace: auth
          port: 5554
  tls:
    passthrough: true
