apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dex-ingress-route
  namespace: auth
  labels:
    noodles.dashboard/service: "true"
  annotations:
    noodles.dashboard/name: "Dex"
    noodles.dashboard/description: "OIDC identity provider"
    noodles.dashboard/category: "Security"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`dex.noodles.quest`)
      kind: Rule
      services:
        - name: dex
          namespace: auth
          port: 5556
  tls:
    secretName: noodles-quest-prod-tls
