apiVersion: v1
kind: Service
metadata:
  name: service
  namespace: jellyfin
spec:
  selector:
    app: jellyfin
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8096
      name: jellyfin-tcp
    - protocol: UDP
      port: 7359
      targetPort: 7359
      name: jellyfin-udp
  type: ClusterIP
---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: traefik-service
  namespace: jellyfin
spec:
  weighted:
    services:
      - name: service
        namespace: jellyfin
        port: 80
        weight: 1
