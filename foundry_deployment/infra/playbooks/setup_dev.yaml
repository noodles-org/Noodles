- name: Set up dev environment
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    kubeconfig_path: "{{ (kubeconfig | default('~/.kube/foundry_config')) | expanduser }}"
    cluster_name: foundry-cluster
    cluster_server: https://10.0.128.157:6443
    context_name: noodles-oidc
    oidc_user: oidc
    oidc_issuer_url: https://dex.noodles.quest
    oidc_client_id: kubelogin
    cluster_ca: "{{ playbook_dir }}/../config/cluster-ca.crt"
    auth_secret: "{{ playbook_dir }}/../k8s/auth/.secret.yaml"
    infra_dir: "{{ playbook_dir }}/.."

  tasks:
    - name: Check Homebrew is installed
      command: which brew
      changed_when: false
      register: brew_check
      failed_when: brew_check.rc != 0

    - name: Check for required tools
      command: "which {{ item.bin }}"
      changed_when: false
      failed_when: false
      register: tool_checks
      loop:
        - { bin: aws, pkg: awscli }
        - { bin: sops, pkg: sops }
        - { bin: kubectl, pkg: kubectl }
        - { bin: kubectl-oidc_login, pkg: kubelogin }

    - name: Install missing tools via Homebrew
      command: "brew install {{ item.item.pkg }}"
      when: item.rc != 0
      loop: "{{ tool_checks.results }}"
      loop_control:
        label: "{{ item.item.pkg }}"

    - name: Prompt user to authenticate with AWS
      pause:
        prompt: >-
          AWS CLI has been installed. Please open a new terminal and run
          'aws configure' or 'aws sso login' to authenticate, then press
          Enter to continue

    - name: Verify AWS authentication
      command: aws sts get-caller-identity
      changed_when: false

    - name: Decrypt secrets via sops
      shell: "sops --decrypt {{ item.src }} > {{ item.dest }}"
      args:
        chdir: "{{ infra_dir }}"
      loop:
        - { src: "playbooks/.secrets/restic-ansible-vault.enc.yaml", dest: "playbooks/.secrets/restic-ansible-vault.yaml" }
        - { src: ".secrets/argocd.enc.yaml", dest: "k8s/argocd/.secret.yaml" }
        - { src: ".secrets/auth.enc.yaml", dest: "k8s/auth/.secret.yaml" }
        - { src: ".secrets/foundry.enc.yaml", dest: "k8s/foundry/.secret.yaml" }
        - { src: ".secrets/monitoring.enc.yaml", dest: "k8s/monitoring/.secret.yaml" }
        - { src: ".secrets/escrow.enc", dest: ".secrets/escrow" }
        - { src: ".secrets/grafana-loki-values.enc.yaml", dest: "helm/grafana-loki/values.yaml" }
        - { src: ".secrets/grafana-alloy-values.enc.yaml", dest: "helm/grafana-alloy/values.yaml" }
      loop_control:
        label: "{{ item.src }}"

    - name: Ensure kubeconfig directory exists
      file:
        path: "{{ kubeconfig_path | dirname }}"
        state: directory

    - name: Check for existing kubeconfig
      stat:
        path: "{{ kubeconfig_path }}"
      register: existing_kubeconfig

    - name: Back up existing kubeconfig
      copy:
        src: "{{ kubeconfig_path }}"
        dest: "{{ kubeconfig_path }}.bak"
        remote_src: true
      when: existing_kubeconfig.stat.exists

    - name: Read kubelogin client secret
      shell: "grep 'KUBELOGIN_CLIENT_SECRET:' {{ auth_secret }} | head -1 | sed 's/.*: *//'"
      changed_when: false
      register: kubelogin_secret

    - name: Build kubeconfig
      shell: |
        set -e
        kubectl config set-cluster {{ cluster_name }} \
          --server={{ cluster_server }} \
          --certificate-authority={{ cluster_ca }} \
          --embed-certs=true

        kubectl config set-credentials {{ oidc_user }} \
          --exec-api-version=client.authentication.k8s.io/v1beta1 \
          --exec-command=kubectl \
          --exec-arg=oidc-login \
          --exec-arg=get-token \
          --exec-arg=--oidc-issuer-url={{ oidc_issuer_url }} \
          --exec-arg=--oidc-client-id={{ oidc_client_id }} \
          --exec-arg=--oidc-extra-scope=email \
          --exec-arg=--oidc-extra-scope=groups \
          --exec-arg=--oidc-client-secret='{{ kubelogin_secret.stdout }}'

        kubectl config set-context {{ context_name }} \
          --cluster={{ cluster_name }} \
          --user={{ oidc_user }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Use context
      command: "kubectl config use-context {{ context_name }}"
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Print summary
      debug:
        msg:
          - "Dev environment setup complete!"
          - "Kubeconfig: {{ kubeconfig_path }}"
          - "Context:    {{ context_name }}"
          - "Use: export KUBECONFIG={{ kubeconfig_path }}"
