- name: Set up K3s cluster
  hosts: localhost
  connection: local
  gather_facts: false

  vars_prompt:
    - name: config
      prompt: kube config file location
      private: false

  tasks:
    - name: Verify config file location
      stat:
        path: "{{ config }}"
      register: file_path
      failed_when: file_path.stat.exists == false or file_path.stat.mimetype != "text/plain"

    - name: Install cert-manager
      shell: kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.18.2/cert-manager.yaml
      environment:
        KUBECONFIG: "{{ file_path.stat.path }}"

    - name: Add Helm repos
      shell: |
        helm repo add argo https://argoproj.github.io/argo-helm
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo add dex https://charts.dexidp.io
      environment:
        KUBECONFIG: "{{ file_path.stat.path }}"

    - name: Build Prometheus stack Helm dependencies
      shell: helm dependency build ../helm/prometheus-stack
      environment:
        KUBECONFIG: "{{ file_path.stat.path }}"

    - name: Install Helm charts
      shell: |
        helm install argocd ../../../argocd/infra/helm/argocd --namespace argocd -f ../../../argocd/infra/helm/argocd/values.yaml --create-namespace
        helm install prometheus-stack ../helm/prometheus-stack --namespace monitoring -f ../helm/prometheus-stack/values.yaml --create-namespace
        helm install dex dex/dex --namespace auth -f ../helm/dex/values.yaml
      environment:
        KUBECONFIG: "{{ file_path.stat.path }}"

    - name: Apply auth resources
      shell: kubectl apply -f ../k8s/auth/.
      environment:
        KUBECONFIG: "{{ file_path.stat.path }}"

    - name: Apply Foundry resources
      shell: |
        kubectl apply -f ../k8s/foundry/.
        kubectl apply -f ../k8s/foundry/jobs/.
      environment:
        KUBECONFIG: "{{ file_path.stat.path }}"

    - name: Apply Traefik resources
      shell: kubectl apply -f ../k8s/traefik/.
      environment:
        KUBECONFIG: "{{ file_path.stat.path }}"

    - name: Apply monitoring resources
      shell: |
        kubectl apply -f ../k8s/monitoring/.
        kubectl apply -f ../k8s/monitoring/dashboards/.
        kubectl apply -f ../k8s/monitoring/alerts/.
      environment:
        KUBECONFIG: "{{ file_path.stat.path }}"

    - name: Apply ArgoCD resources
      shell: kubectl apply -f ../../../argocd/infra/k8s/.
      environment:
        KUBECONFIG: "{{ file_path.stat.path }}"
